const LS_KEY = "kengura_v1";
function loadStore(){
  const defaults = {
    sessions:[], catStats:{}, subStats:{},
    mechStats:{},      // { mech: { 3:{attempts,wrong}, 4:{...}, 5:{...} } }
    dueQueue:{},       // { "year-num": {year, num, mech, band, dueAt, streak} }
    masteredMech:{},   // { mech: timestamp }
    confStats:{a:{attempts:0,wrong:0}, b:{attempts:0,wrong:0}, c:{attempts:0,wrong:0}},
    activity:{},       // { "YYYY-MM-DD": {answered, correct, secondsOnTask} }
    contests:[],       // [{when, year, points, scoreWithPenalty, maxPoints, correct, total, answered, byBand}]
    settings:{count:15, difficulties:[3,4,5], useTimer:true, kenguraMode:false, negativeScore:false}
  };
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaults;
    const o = JSON.parse(raw);
    o.sessions = o.sessions || [];
    o.catStats = o.catStats || {};
    o.subStats = o.subStats || {};
    o.mechStats = o.mechStats || {};
    o.dueQueue = o.dueQueue || {};
    o.masteredMech = o.masteredMech || {};
    o.confStats = o.confStats || defaults.confStats;
    for(const c of ["a","b","c"]){
      o.confStats[c] = o.confStats[c] || {attempts:0, wrong:0};
    }
    o.activity = o.activity || {};
    o.contests = o.contests || [];
    o.settings = Object.assign({}, defaults.settings, o.settings || {});
    return o;
  }catch(e){
    return defaults;
  }
}

function todayKey(){
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${m}-${da}`;
}

function logActivity(correct){
  const k = todayKey();
  const a = store.activity[k] = store.activity[k] || {answered:0, correct:0};
  a.answered++;
  if(correct) a.correct++;
}

/* Spaced-repetition intervals (in days). Each consecutive correct answer
   bumps the streak; a wrong answer resets streak to 0 and re-queues the
   question for tomorrow. */
const SR_INTERVALS_DAYS = [1, 3, 7, 14, 30];
const ONE_DAY_MS = 24 * 60 * 60 * 1000;

function recordArchiveAnswer(year, q, correct, confidence){
  logActivity(correct);
  // Confidence stats (independent of mechanic)
  if(confidence && store.confStats[confidence]){
    store.confStats[confidence].attempts++;
    if(!correct) store.confStats[confidence].wrong++;
  }
  const mech = q.mechanic;
  if(!mech) return;
  const band = q.points || 3;
  const ms = store.mechStats[mech] = store.mechStats[mech] || {};
  const slot = ms[band] = ms[band] || {attempts:0, wrong:0};
  slot.attempts++;
  if(!correct) slot.wrong++;

  const key = `${year}-${q.num}`;
  const now = Date.now();
  const existing = store.dueQueue[key] || {streak:0};
  let nextStreak;
  if(correct){
    nextStreak = (existing.streak || 0) + 1;
  } else {
    nextStreak = 0;
  }
  // If they got it right at the highest streak — graduate (remove from queue).
  if(correct && nextStreak >= SR_INTERVALS_DAYS.length){
    delete store.dueQueue[key];
  } else {
    const intervalDays = SR_INTERVALS_DAYS[Math.min(nextStreak, SR_INTERVALS_DAYS.length-1)];
    store.dueQueue[key] = {
      year, num:q.num, mech, band,
      dueAt: now + intervalDays * ONE_DAY_MS,
      streak: nextStreak,
    };
  }
  saveStore(store);
}

/* Return a list of due questions (whose dueAt < now), newest dueAt first. */
function dueNow(){
  const now = Date.now();
  const out = [];
  for(const k of Object.keys(store.dueQueue)){
    const item = store.dueQueue[k];
    if(item.dueAt <= now) out.push(item);
  }
  out.sort((a,b)=>a.dueAt - b.dueAt);
  return out;
}

/* Weakest mechanics: those with >= 2 attempts and worst error rate. */
function weakestMechanics(limit){
  limit = limit || 5;
  const rows = [];
  for(const m of Object.keys(store.mechStats)){
    const bands = store.mechStats[m];
    let attempts = 0, wrong = 0;
    for(const b of [3,4,5]){
      if(!bands[b]) continue;
      attempts += bands[b].attempts;
      wrong += bands[b].wrong;
    }
    if(attempts < 2) continue;
    rows.push({mech:m, attempts, wrong, rate: wrong/attempts});
  }
  rows.sort((a,b)=>b.rate - a.rate);
  return rows.slice(0, limit);
}

function startTimer(totalMs){
  stopTimer();
  state.timerActive = true;
  state.timerTotalMs = totalMs;
  state.timerEndAt = Date.now() + totalMs;
  state.timerInterval = setInterval(()=>{
    if(state.view !== "quiz"){ return; }
    const left = state.timerEndAt - Date.now();
    if(left <= 0){
      stopTimer();
      // Auto-finish on timeout
      finishQuiz(true);
      return;
    }
    // Re-render only the timer bar to avoid flashing options
    const bar = document.querySelector(".timer-bar");
    if(bar){
      const mins = Math.floor(left/60000);
      const secs = Math.floor((left%60000)/1000);
      const ratio = left/state.timerTotalMs;
      const cls = left < 60000 ? "warn" : (ratio > 0.5 ? "calm" : "");
      const clock = bar.querySelector(".clock");
      if(clock){
        clock.className = "clock " + cls;
        clock.textContent = `${mins}:${String(secs).padStart(2,"0")}`;
      }
    }
  }, 500);
}

function stopTimer(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval = null; }
  state.timerActive = false;
}

const ARCHIVE = (window.KENGURA_ARCHIVE && window.KENGURA_ARCHIVE.archive) || [];

// Pattern label → user-facing Lithuanian label
const PATTERN_LABEL = {
  aritmetika:"Aritmetika", geometrija:"Geometrija", logika:"Logika",
  skaiciavimas:"Skaičiavimas", erdve:"Erdvinis", uzdaviniai:"Žodinis uždavinys",
  seka:"Seka", paveikslelis:"Su paveikslėliu",
};

/* Choose a generator that matches BOTH the question's mechanic and its
   difficulty band. Returns null when nothing matches — the caller is
   expected to fall back to archive cross-links so we never serve a
   3-point arithmetic generator as practice for a 5-point logic puzzle. */
function pickGenForMechBand(mechanic, band){
  const idx = MECH_BAND_INDEX[mechanic];
  if(!idx) return null;
  const sameBand = idx[band];
  if(sameBand && sameBand.length){
    return sameBand[Math.floor(Math.random()*sameBand.length)];
  }
  return null;
}

/* Find archive questions of the same mechanic and SAME points band as `q`,
   excluding q itself. Returns up to `limit` items, newest first.
   Used as the fallback "Praktikuotis šio tipo" path when no generator
   covers the mechanic at the right band. */
function findSimilarArchive(q, sourceYear, limit){
  if(!q.mechanic) return [];
  limit = limit || 4;
  const out = [];
  const wantBand = q.points || 3;
  // walk archive newest-first
  for(let i = ARCHIVE.length - 1; i >= 0; i--){
    const t = ARCHIVE[i];
    for(const cand of t.questions){
      if(t.year === sourceYear && cand.num === q.num) continue;
      if(cand.mechanic !== q.mechanic) continue;
      if((cand.points || 3) !== wantBand) continue;
      out.push({year: t.year, q: cand});
      if(out.length >= limit) return out;
    }
  }
  return out;
}

/* Public entry point: given an archive question, return a routing decision:
     {kind:"generator", gen:"keyName"}            — open a generator
     {kind:"archive",   items:[{year,q},...]}     — open one of these archive Qs
     {kind:"fallback",  gen:"keyName"}            — last-resort random gen
*/
function pickPracticeFor(q, sourceYear){
  if(q && q.mechanic){
    const band = q.points || 3;
    const gen = pickGenForMechBand(q.mechanic, band);
    if(gen) return {kind:"generator", gen};
    // also try ±1 band before giving up on generators
    const adj = pickGenForMechBand(q.mechanic, band === 5 ? 4 : (band === 3 ? 4 : 5));
    // For 5-point sources we DO NOT downgrade to a 4-point generator —
    // that would defeat the whole point. Only allow 3↔4 adjacency.
    if(band !== 5 && adj){
      return {kind:"generator", gen:adj};
    }
    const items = findSimilarArchive(q, sourceYear, 4);
    if(items.length) return {kind:"archive", items};
  }
  // last resort: pure random generator
  const key = GENERATOR_KEYS[Math.floor(Math.random()*GENERATOR_KEYS.length)];
  return {kind:"fallback", gen:key};
}

// Legacy entry kept for callers that pass just patterns (results page).
function pickGeneratorFor(patterns){
  return GENERATOR_KEYS[Math.floor(Math.random()*GENERATOR_KEYS.length)];
}

// State for archive answers, lives only in memory (resetting on reload is fine)
state.archiveAnswers = state.archiveAnswers || {};

/* ----------------------------------------------------------------
   AI help (optional) — calls the Netlify function `/help`.
   - localStorage cache by (qid, kind, tier|chosenLetter): once the
     family pays for one hint, the same hint is free forever.
   - Per-session "endpoint dead" flag — if the first call fails
     (404, network error), we don't keep retrying on every click.
   - Fallback: if AI is unavailable, the existing hardcoded
     MECHANIC_HINTS / q.solutionKid / q.misconceptions render as before.
   ---------------------------------------------------------------- */
const AI_ENDPOINT = "/.netlify/functions/help";
const AI_CACHE_PREFIX = "kgr.ai.";
state.aiBusy = state.aiBusy || {};   // key → bool (request in flight)
state.aiText = state.aiText || {};   // key → string (loaded text)
state.aiError = state.aiError || {}; // key → string (last error)
let _aiEndpointDead = false;

function aiCacheKey(opts){
  const tail = opts.kind === "hint" ? `t${opts.tier}` :
               opts.kind === "misconception" ? `c${opts.chosenIdx}` : "_";
  return `${AI_CACHE_PREFIX}${opts.qid}.${opts.kind}.${tail}`;
}

function aiStateKey(opts){
  // separate from cache key — the in-memory bucket per (year, num, kind, tier)
  return aiCacheKey(opts).slice(AI_CACHE_PREFIX.length);
}

function aiReadCache(opts){
  try { return localStorage.getItem(aiCacheKey(opts)); } catch { return null; }
}
function aiWriteCache(opts, text){
  try { localStorage.setItem(aiCacheKey(opts), text); } catch {}
}

async function aiFetch(opts){
  if(_aiEndpointDead) return null;
  const cached = aiReadCache(opts);
  if(cached){ state.aiText[aiStateKey(opts)] = cached; return cached; }

  const sk = aiStateKey(opts);
  if(state.aiBusy[sk]) return null;
  state.aiBusy[sk] = true;
  delete state.aiError[sk];
  try {
    const r = await fetch(AI_ENDPOINT, {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify(opts),
    });
    if(r.status === 404){
      _aiEndpointDead = true;
      return null;
    }
    const data = await r.json().catch(() => ({error: "Bad JSON from /help."}));
    if(!r.ok || !data.text){
      state.aiError[sk] = data.error || `HTTP ${r.status}`;
      return null;
    }
    aiWriteCache(opts, data.text);
    state.aiText[sk] = data.text;
    return data.text;
  } catch(e) {
    // network unreachable → endpoint dead for this session
    _aiEndpointDead = true;
    state.aiError[sk] = "AI nepasiekiamas (be tinklo arba ne per Netlify).";
    return null;
  } finally {
    state.aiBusy[sk] = false;
  }
}

function aiTextFor(opts){
  // synchronous lookup for render: cache → in-memory state → null
  return aiReadCache(opts) || state.aiText[aiStateKey(opts)] || null;
}

function aiBuildOpts(year, q, kind, extra){
  const correctIdx = q.correct ? "ABCDE".indexOf(q.correct) : -1;
  return {
    kind,
    qid: `${year}-${q.num}`,
    question: q.prompt || "",
    options: (q.options || []).map(o => o || ""),
    correctIdx: correctIdx >= 0 ? correctIdx : 0,
    mechanic: q.mechanic || null,
    band: q.points || null,
    ...(extra || {}),
  };
}

function approachFromSolution(sol){
  if(!sol) return "";
  // Solutions begin with the answer value (e.g. "8" or "Pomidorus") followed
  // by either "!" (approach) or "?" (alternative).  We start AT the first
  // such marker so the answer never bleeds into the hint.
  const markerIdx = sol.search(/[!?]\s/);
  let s = (markerIdx >= 0 ? sol.slice(markerIdx + 1) : sol).trim();
  // also strip a stray leading punctuation
  s = s.replace(/^[\s,;:.-]+/, "");
  // Take only the first sentence to keep the hint a *strategy*, not a
  // walk-through that hands the answer over.  Fall back to a 140-char
  // hard cap if no sentence break exists yet.
  const firstEnd = s.search(/[.?!]\s/);
  if(firstEnd > 30){
    s = s.slice(0, firstEnd + 1);
  } else if(s.length > 140){
    s = s.slice(0, 140) + "…";
  }
  return s;
}

function renderArchiveYear(){
  const test = ARCHIVE.find(t => t.year === state.archiveYear);
  if(!test){ state.view="home"; renderHome(); return; }
  // count answered + correct in this year so far
  const total = test.questions.length;
  let answered = 0, correct = 0;
  test.questions.forEach(q => {
    const key = `${test.year}-${q.num}`;
    const a = state.archiveAnswers[key];
    if(a && a.chosen != null){
      answered++;
      if(q.correct && q.options[q.correct] && a.chosenLetter === q.correct) correct++;
    }
  });
  const pdfHref = test.solutions_pdf ? encodeURI(test.solutions_pdf) : (test.test_pdf ? encodeURI(test.test_pdf) : null);

        ${test.test_pdf ? `<a class="pill" style="text-decoration:none" href="${encodeURI(test.test_pdf)}" target="_blank">Testo PDF ↗</a>` : ``}
        ${test.solutions_pdf ? `<a class="pill" style="text-decoration:none" href="${encodeURI(test.solutions_pdf)}" target="_blank">Sprendimai ↗</a>` : ``}
      </div>
      <p>Spręsk uždavinius – kiekvieną gali pasitikrinti vietoje. „Užuomina" parodo strategijos kryptį iš oficialaus sprendimo (be paties atsakymo). Po atsakymo gausi pilną sprendimą bei galimybę spręsti panašaus tipo uždavinį.</p>
    </section>
    ${test.questions.map(q => renderArchiveCard(test.year, q)).join("")}
    <section class="card"><div class="footer-actions">
      <button class="btn ghost" id="back2">← Į pradžią</button>
    </div></section>
  `;
  document.getElementById("back").addEventListener("click", ()=>{state.view="home"; renderHome();});
  document.getElementById("back2").addEventListener("click", ()=>{state.view="home"; renderHome();});

  // wire up per-card listeners
  $app.querySelectorAll(".archive-card").forEach(card=>{
    const qnum = parseInt(card.dataset.qnum, 10);
    const year = card.dataset.year;
    const key = `${year}-${qnum}`;
    const test = ARCHIVE.find(t=>t.year===year);
    const q = test.questions.find(x=>x.num===qnum);
    const ans = state.archiveAnswers[key] || {};

    card.querySelectorAll(".opt[data-letter]").forEach(opt=>{
      opt.addEventListener("click", ()=>{
        if(ans.submitted) return;
        const letter = opt.dataset.letter;
        state.archiveAnswers[key] = {...ans, chosen: letter, chosenLetter: letter};
        renderArchiveYear();
      });
    });

    const hintBtn = card.querySelector("[data-action=hint]");
    if(hintBtn) hintBtn.addEventListener("click", ()=>{
      const tier = Math.min(3, (state.archiveAnswers[key]?.hintTier || 0) + 1);
      state.archiveAnswers[key] = {...(state.archiveAnswers[key]||{}), hintTier: tier};
      renderArchiveYear();
      // Fire AI fetch in parallel — render shows hardcoded blurb first,
      // then re-renders with the AI-specific text once it arrives.
      if(!_aiEndpointDead && q.correct){
        const opts = aiBuildOpts(year, q, "hint", {tier});
        if(!aiTextFor(opts)){
          aiFetch(opts).then(() => renderArchiveYear());
        }
      }
    });

    card.querySelectorAll("[data-conf]").forEach(btn => {
      btn.addEventListener("click", ()=>{
        const cur = state.archiveAnswers[key] || {};
        state.archiveAnswers[key] = {...cur, confidence: btn.dataset.conf};
        renderArchiveYear();
      });
    });

    const submitBtn = card.querySelector("[data-action=submit]");
    if(submitBtn) submitBtn.addEventListener("click", ()=>{
      const cur = state.archiveAnswers[key] || {};
      if(cur.chosenLetter == null) return;
      state.archiveAnswers[key] = {...cur, submitted: true};
      // legacy: record into pattern-level catStats (kept for backwards compat)
      if(q.correct && q.patterns && q.patterns.length){
        const cat = q.patterns[0];
        const c = store.catStats[cat] = store.catStats[cat] || {attempts:0, wrong:0};
        c.attempts++;
        if(cur.chosenLetter !== q.correct) c.wrong++;
        saveStore(store);
      }
      // mechanic-level stats + spaced-repetition queue + confidence
      if(q.correct){
        recordArchiveAnswer(year, q, cur.chosenLetter === q.correct, cur.confidence);
      }
      renderArchiveYear();
    });

    const practiceBtn = card.querySelector("[data-practice]");
    if(practiceBtn) practiceBtn.addEventListener("click", ()=>{
      state._returnTo = "archiveYear";
      openSimilar(practiceBtn.dataset.practice);
    });
    const practiceArchiveBtn = card.querySelector("[data-practice-archive]");
    if(practiceArchiveBtn) practiceArchiveBtn.addEventListener("click", ()=>{
      // Re-compute on click so the year/q is fresh.
      const items = findSimilarArchive(q, year, 4);
      if(!items.length){ return; }
      // Pick a random one to jump to its year, then scroll to that question.
      const target = items[Math.floor(Math.random()*items.length)];
      state.archiveYear = target.year;
      state.view = "archiveYear";
      renderArchiveYear();
      // Scroll into view on next tick.
      setTimeout(()=>{
        const el = document.querySelector(`.archive-card[data-year="${target.year}"][data-qnum="${target.q.num}"]`);
        if(el){
          el.scrollIntoView({behavior:"smooth", block:"start"});
          el.style.outline = "3px solid var(--accent)";
          setTimeout(()=>{ el.style.outline = ""; }, 2500);
        }
      }, 60);
    });
  });
}

function renderArchiveCard(year, q){
  const key = `${year}-${q.num}`;
  const ans = state.archiveAnswers[key] || {};
  const submitted = !!ans.submitted;

  // Image-option rendering: when option text is empty (placeholder/bogus
  // extraction), the choice is a picture in the figure. Render JUST the
  // letter circle so the kid taps it after looking at the figure.
  const isImageOnly = !!q.imageOnlyOptions;
  const hasMixed = !!q.hasMissingOptionText;
  const imageHint = isImageOnly
    ? `<p class="help-bar" style="margin:0 0 6px"><b>Atsakymai – paveikslėlyje.</b> Pažymėk raidę pagal pasirinktą pavyzdį.</p>`
    : (hasMixed ? `<p class="help-bar" style="margin:0 0 6px">Kai kurie atsakymai – paveikslėlyje (be teksto). Pažymėk raidę.</p>` : '');
  const optionsHtml = ["A","B","C","D","E"].map(letter=>{
    const vRaw = q.options[letter];
    if(vRaw == null) return "";
    const v = String(vRaw);
    const isEmptyOpt = v.trim() === "";
    let extra = "";
    if(submitted){
      if(q.correct === letter) extra = " correct";
      else if(ans.chosenLetter === letter) extra = " wrong";
    } else if(ans.chosenLetter === letter){
      extra = " selected";
    }
    if(isImageOnly){
      // Just letter pill, large enough to tap
      return `<div class="opt opt-letter-only${extra}" data-letter="${letter}">
        <span class="letter">${letter}</span>
      </div>`;
    }
    return `<div class="opt${isEmptyOpt ? ' opt-empty' : ''}${extra}" data-letter="${letter}">
      <span class="letter">${letter}</span>
      <span>${isEmptyOpt ? '<i style="color:var(--muted)">— atsakymas paveikslėlyje —</i>' : escapeHTML(v)}</span>
    </div>`;
  }).join("");

  const tags = (q.patterns||[]).map(p =>
    `<span class="pill muted">${escapeHTML(PATTERN_LABEL[p]||p)}</span>`
  ).join(" ");
  // Mechanic pill (a finer-grained classification than the legacy patterns).
  const mechPill = q.mechanic
    ? `<span class="pill" title="Užduoties tipas">${escapeHTML(MECHANIC_LABEL[q.mechanic]||q.mechanic)}</span>`
    : "";
  const practice = pickPracticeFor(q, year);
  const figureHtml = q.figure
    ? `<div class="figure"><img src="${encodeURI(q.figure)}" alt="Klausimas ${q.num} (originalas)" style="max-width:100%;border-radius:8px;border:1px solid var(--line)" loading="lazy"></div>`
    : "";

  // Hint ladder: 4 tiers per mechanic — notice → ask → suggest → tell.
  // The 4th tier is the per-question full solution.
  const hints = (q.mechanic && MECHANIC_HINTS[q.mechanic]) || null;
  const hintTier = ans.hintTier || 0;   // 0..3
  const tierLabels = ["Pastebėk", "Klausimas sau", "Pasiūlymas", "Pilnas sprendimas"];

  // Misconception line: when wrong answer is submitted, look up
  // q.misconceptions[chosenLetter] and surface it.
  const wrongLetter = submitted && ans.chosenLetter !== q.correct ? ans.chosenLetter : null;
  const miscText = wrongLetter && q.misconceptions && q.misconceptions[wrongLetter]
    ? q.misconceptions[wrongLetter] : null;

  // AI text resolution — prefer per-question AI text over generic blurb.
  const aiHint = (tier) => q.correct && q.mechanic
    ? aiTextFor(aiBuildOpts(year, q, "hint", {tier})) : null;
  const aiHintBusy = (tier) => {
    const opts = aiBuildOpts(year, q, "hint", {tier});
    return state.aiBusy[aiStateKey(opts)];
  };
  const fallbackHint = {1: hints?.notice, 2: hints?.ask, 3: hints?.suggest};
  const renderHintTier = (tier) => {
    const ai = aiHint(tier);
    const fb = fallbackHint[tier];
    const text = ai || fb;
    if(!text){
      return aiHintBusy(tier)
        ? `<div class="hint tier-${tier}"><b>${tierLabels[tier-1]}:</b> <i>kraunasi…</i></div>`
        : "";
    }
    const aiTag = ai ? ` <span class="pill" title="AI sugeneruota užuomina šiam uždaviniui" style="font-size:10px">AI</span>` : "";
    const busyTag = !ai && aiHintBusy(tier) ? ` <i style="color:var(--muted);font-size:12px">(kraunasi geresnė…)</i>` : "";
    return `<div class="hint tier-${tier}"><b>${tierLabels[tier-1]}:</b>${aiTag} ${escapeHTML(text)}${busyTag}</div>`;
  };

  // Solution + misconception — prefer curated, fall back to AI when missing.
  const wrongIdx = wrongLetter ? "ABCDE".indexOf(wrongLetter) : -1;
  let aiSolutionText = null;
  let aiMiscText = null;
  if(submitted && q.correct){
    if(!q.solutionKid){
      const sOpts = aiBuildOpts(year, q, "solution");
      aiSolutionText = aiTextFor(sOpts);
      if(!aiSolutionText && !state.aiBusy[aiStateKey(sOpts)] && !_aiEndpointDead){
        aiFetch(sOpts).then(() => renderArchiveYear());
      }
    }
    if(wrongLetter && wrongIdx >= 0 && !miscText){
      const mOpts = aiBuildOpts(year, q, "misconception", {chosenIdx: wrongIdx});
      aiMiscText = aiTextFor(mOpts);
      if(!aiMiscText && !state.aiBusy[aiStateKey(mOpts)] && !_aiEndpointDead){
        aiFetch(mOpts).then(() => renderArchiveYear());
      }
    }
  }

  let bottom = "";
  if(submitted){
    const right = ans.chosenLetter === q.correct;
    const finalMiscText = miscText || aiMiscText;
    const miscIsAi = !miscText && !!aiMiscText;
    const finalSolutionText = q.solutionKid || aiSolutionText || q.solution;
    const solutionIsAi = !q.solutionKid && !!aiSolutionText;
    bottom = `<div class="explain" style="background:${right?'var(--good-soft)':'var(--bad-soft)'};border:1px solid ${right?'var(--good)':'var(--bad)'};">
        <b>${right ? "Teisingai!" : "Klaida."}</b>
        ${q.correct ? ` Teisingas atsakymas – <b>${q.correct}</b>${q.options[q.correct]?` (${escapeHTML(q.options[q.correct])})`:''}.` : ''}
        ${finalMiscText ? `<div class="misconception" style="margin-top:6px;font-size:13px"><b>Tavo klaida:</b>${miscIsAi?' <span class="pill" style="font-size:10px">AI</span>':''} ${escapeHTML(finalMiscText)}</div>` : ''}
      </div>
      ${finalSolutionText ? `<div class="explain"><b>Sprendimas:</b>${solutionIsAi?' <span class="pill" style="font-size:10px">AI</span>':''} ${escapeHTML(finalSolutionText)}</div>` : ''}
    `;
  } else {
    // Show all unlocked hint tiers, accumulated.
    const blocks = [];
    if(hintTier >= 1) blocks.push(renderHintTier(1));
    if(hintTier >= 2) blocks.push(renderHintTier(2));
    if(hintTier >= 3) blocks.push(renderHintTier(3));
    bottom = blocks.filter(Boolean).join("");
  }

  const canSubmit = q.correct && ans.chosenLetter && !submitted;
  // Confidence picker — only shown when the kid has chosen but not yet submitted.
  const showConfidence = canSubmit && !ans.confidence;
  const confLabels = {a: "Tikrai žinau", b: "Spėju iš dviejų", c: "Atsitiktinai"};
  const conf = ans.confidence || null;
  // Practice button. Three cases:
  //   - generator at the right mechanic+band → single button → opens generator
  //   - no generator but archive matches      → button opens an archive picker
  //   - last-resort random generator (no mechanic on the question, or
  //     5-point source with no in-band generator and no archive hit) →
  //     show with a quiet warning so the kid knows it's just an example
  let practiceBtn = "";
  if(practice.kind === "generator"){
    practiceBtn = `<button class="btn small" data-practice="${practice.gen}" title="Sugeneruotas to paties tipo uždavinys">Praktikuotis šio tipo</button>`;
  } else if(practice.kind === "archive"){
    practiceBtn = `<button class="btn small" data-practice-archive="1" title="Panašus uždavinys iš archyvo (to paties mechanikos ir to paties sudėtingumo)">Panaši užduotis iš archyvo (${practice.items.length})</button>`;
  } else {
    practiceBtn = `<button class="btn small ghost" data-practice="${practice.gen}" title="Tikslaus to paties tipo generatoriaus dar nėra – tai tik kitas šio sudėtingumo uždavinys">Praktikuotis (kito tipo)</button>`;
  }
  return `
    <section class="card archive-card" data-year="${year}" data-qnum="${q.num}">
      <div class="qmeta">
        <b>Klausimas ${q.num}</b>
        <span class="pill">${q.points} t.</span>
        ${mechPill}
        ${tags}
      </div>
      <div class="qprompt">${escapeHTML(q.prompt)}</div>
      ${figureHtml}
      <div class="options">${optionsHtml}</div>
      ${bottom}
      ${showConfidence ? `<div class="confidence-row">
        <span class="help-bar" style="margin:0 8px 0 0">Kiek esi tikras?</span>
        ${["a","b","c"].map(c => `<button class="btn small ghost" data-conf="${c}">${confLabels[c]}</button>`).join("")}
      </div>` : ''}
      ${conf ? `<div class="help-bar">Pasitikėjimas: <b>${confLabels[conf]}</b></div>` : ''}
      <div class="footer-actions">
        <div class="row">
          ${!submitted && q.correct && (hints || !_aiEndpointDead) && hintTier < 3 ? `<button class="btn small ghost" data-action="hint">Užuomina (${hintTier+1}/3)</button>` : ''}
          ${!q.correct ? `<span class="help-bar">Šiems metams atsakymo nėra – pasitikrink PDF.</span>` : ''}
        </div>
        <div class="row">
          ${canSubmit && conf ? `<button class="btn small primary" data-action="submit">Patikrinti</button>` : (canSubmit ? '' : '')}
          ${practiceBtn}
        </div>
      </div>
    </section>
  `;
}

function startQuiz(){
  const count = store.settings.count;
  const kengura = store.settings.kenguraMode || count === 30;
  if(kengura){
    state.questions = generateKenguraQuiz(count);
  } else {
    state.questions = generateQuiz(count, store.settings.difficulties);
  }
  state.current = 0;
  state.answers = [];
  state.hintsUsedThis = 0;
  state._chosen = null; state._hintShown = false; state._firstStepShown = false;
  state._confidence = null;
  state._questionStartedAt = Date.now();
  state.view = "quiz";
  if(store.settings.useTimer){
    // Real Kengūra Benjamin: 75 minutes for 30 questions = 2.5 min/q.
    // Scale linearly with count.
    const minutes = Math.round(count * 2.5);
    startTimer(minutes * 60 * 1000);
  } else {
    stopTimer();
  }
  renderQuiz();
}

// Cache of each generator's nominal difficulty (sampled once with seed=1).
const GEN_DIFF = {};
function getGenDiff(key){
  if(GEN_DIFF[key] != null) return GEN_DIFF[key];
  try{ GEN_DIFF[key] = GENERATORS[key](1).difficulty; }catch(e){ GEN_DIFF[key] = 3; }
  return GEN_DIFF[key];
}

// Build a Kengūra-format quiz: Q1-10 = 3pt, Q11-20 = 4pt, Q21-30 = 5pt.
// For shorter `count`, scale buckets proportionally.
function generateKenguraQuiz(count){
  const third = Math.floor(count/3);
  const buckets = [
    {diff:3, n:third},
    {diff:4, n:third},
    {diff:5, n:count - 2*third},
  ];
  const out = [];
  const rand = rng(Date.now() & 0x7fffffff);
  for(const bucket of buckets){
    const eligible = GENERATOR_KEYS.filter(k => getGenDiff(k) === bucket.diff);
    // Adapt per-key cap to bucket size: a few generators per difficulty
    // need to repeat to fill 10 slots.  Cap = ceil(n / eligible) + slack.
    const cap = eligible.length
      ? Math.max(2, Math.ceil(bucket.n / eligible.length) + 1)
      : 999;
    const used = {};
    let made = 0, safety = 0;
    while(made < bucket.n && safety++ < bucket.n*60){
      const key = eligible.length ? pick(rand, eligible) : pick(rand, GENERATOR_KEYS);
      used[key] = used[key] || 0;
      if(used[key] >= cap) continue;
      const seed = randInt(rand, 1, 9999999);
      const q = buildQuestionFromKey(key, seed);
      out.push(q);
      used[key]++;
      made++;
    }
  }
  return out;
}

function renderTimerBar(){
  if(!state.timerActive) return "";
  const remaining = Math.max(0, state.timerEndAt - Date.now());
  const totalMs = state.timerTotalMs || 1;
  const mins = Math.floor(remaining/60000);
  const secs = Math.floor((remaining%60000)/1000);
  const ratio = remaining/totalMs;
  const cls = remaining < 60000 ? "warn" : (ratio > 0.5 ? "calm" : "");
  const txt = `${mins}:${String(secs).padStart(2,"0")}`;
  return `<div class="timer-bar">
    <span>⏱</span>
    <span class="clock ${cls}">${txt}</span>
    <span class="grow"></span>
    <span class="help-bar">Liko laiko</span>
  </div>`;
}

function submitAnswer(){
  const idx = state.current;
  const q = state.questions[idx];
  const correct = state._chosen === q.correctIndex;
  const now = Date.now();
  const timeMs = state._questionStartedAt ? (now - state._questionStartedAt) : 0;
  state.answers[idx] = {
    chosen: state._chosen,
    correct,
    hintUsed: !!state._hintShown,
    confidence: state._confidence || null,
    timeMs,
  };
  state._confidence = null;
  state._questionStartedAt = now;
  // confidence stats
  if(state._confidence && store.confStats[state._confidence]){
    store.confStats[state._confidence].attempts++;
    if(!correct) store.confStats[state._confidence].wrong++;
  }
  logActivity(correct);
  // record per-category and per-subtopic stats
  const c = store.catStats[q.category] = store.catStats[q.category] || {attempts:0, wrong:0};
  c.attempts++;
  if(!correct) c.wrong++;
  if(q.subtopic){
    const s = store.subStats[q.subtopic] = store.subStats[q.subtopic] || {attempts:0, wrong:0, gen:q.gen};
    s.attempts++;
    if(!correct) s.wrong++;
    s.gen = q.gen;
  }
  saveStore(store);
  renderQuiz();
}

function finishQuiz(early){
  stopTimer();
  const correct = state.answers.filter(a => a && a.correct).length;
  const total = state.questions.length;
  // Naive points: reward only.
  const points = state.questions.reduce((acc,q,i)=> acc + (state.answers[i]?.correct ? q.difficulty : 0), 0);
  // Kangaroo-style points with −25% penalty for wrong (only counts answered).
  const pointsWithPenalty = state.questions.reduce((acc,q,i)=>{
    const a = state.answers[i];
    if(!a) return acc;                           // skipped: 0
    if(a.correct) return acc + q.difficulty;     // correct: full
    return acc - q.difficulty * 0.25;            // wrong: −25%
  }, 0);
  // Per-band time tracking
  const bandTime = {3:0, 4:0, 5:0};
  state.questions.forEach((q,i)=>{
    const a = state.answers[i];
    if(!a || !a.timeMs) return;
    bandTime[q.difficulty || 3] = (bandTime[q.difficulty || 3] || 0) + a.timeMs;
  });
  const session = {
    when: Date.now(),
    total, correct, points,
    pointsWithPenalty: Math.round(pointsWithPenalty * 4) / 4,
    bandTime,
    early: !!early,
    answered: state.answers.filter(a=>a).length,
    questions: state.questions.map((q,i)=>({
      gen:q.gen, category:q.category, subtopic:q.subtopic, difficulty:q.difficulty,
      correct: !!state.answers[i]?.correct,
      hintUsed: !!state.answers[i]?.hintUsed,
      confidence: state.answers[i]?.confidence,
      answered: !!state.answers[i],
    })),
  };
  store.sessions.push(session);
  if(store.sessions.length > 30) store.sessions = store.sessions.slice(-30);
  saveStore(store);
  state.view = "results";
  renderResults();
}

function renderResults(){
  const correct = state.answers.filter(a => a?.correct).length;
  const total = state.questions.length;
  const points = state.questions.reduce((acc,q,i)=> acc + (state.answers[i]?.correct ? q.difficulty : 0), 0);
  const maxPoints = state.questions.reduce((a,q)=>a+q.difficulty,0);
  const negativeOn = !!store.settings.negativeScore;
  const pointsWithPenalty = state.questions.reduce((acc,q,i)=>{
    const a = state.answers[i]; if(!a) return acc;
    if(a.correct) return acc + q.difficulty;
    return acc - q.difficulty * 0.25;
  }, 0);

  // Per-band time spent — recommended budget: 1 min on 3-pt, 2.5 min on 4-pt, 5 min on 5-pt.
  const bandTime = {3:0, 4:0, 5:0};
  const bandCount = {3:0, 4:0, 5:0};
  state.questions.forEach((q,i)=>{
    const a = state.answers[i];
    bandCount[q.difficulty || 3]++;
    if(a && a.timeMs) bandTime[q.difficulty || 3] += a.timeMs;
  });
  const bandBudgetSec = {3:60, 4:150, 5:300};

  // Confidence accuracy this session
  const confSummary = {a:{att:0,ok:0}, b:{att:0,ok:0}, c:{att:0,ok:0}};
  state.questions.forEach((q,i)=>{
    const a = state.answers[i]; if(!a || !a.confidence) return;
    if(!confSummary[a.confidence]) return;
    confSummary[a.confidence].att++;
    if(a.correct) confSummary[a.confidence].ok++;
  });

  // category breakdown for this session
  const catBreak = {};
  state.questions.forEach((q,i)=>{
    const c = catBreak[q.category] = catBreak[q.category] || {ok:0, total:0};
    c.total++;
    if(state.answers[i]?.correct) c.ok++;
  });

  const wrongs = state.questions
    .map((q,i)=>({q, ans:state.answers[i], i}))
    .filter(x => !x.ans || !x.ans.correct);

  const answeredCount = state.answers.filter(a=>a).length;
  const earlyNote = answeredCount < total
    ? `<p class="help-bar" style="margin-top:8px">Pabaigta anksčiau: ${answeredCount} iš ${total} klausimų atsakyti.</p>`
    : ``;
  $app.innerHTML = `
    <section class="card">
      <h2>Testo rezultatai</h2>
      <div class="grid two">
        <div class="stat"><b>${correct} / ${total}</b><span>Teisingų atsakymų</span></div>
        <div class="stat"><b>${points} / ${maxPoints}</b><span>Surinkti taškai</span></div>
        ${negativeOn ? `<div class="stat"><b>${(Math.round(pointsWithPenalty*4)/4).toFixed(2)} / ${maxPoints}</b><span>Su −25% bauda</span></div>` : ''}
      </div>
      ${earlyNote}
    </section>

    <section class="card">
      <h3>Tempas pagal sudėtingumą</h3>
      <p style="margin-top:0;font-size:13px;color:var(--muted)">Rekomenduojama: 3 t. ≈ 1 min, 4 t. ≈ 2,5 min, 5 t. ≈ 5 min užduočiai. Atitinka 75 min/30 klausimų formatą.</p>
      ${[3,4,5].map(b => {
        if(!bandCount[b]) return '';
        const sec = Math.round(bandTime[b]/1000);
        const budget = bandBudgetSec[b] * bandCount[b];
        const pct = budget > 0 ? Math.min(150, Math.round(100*sec/budget)) : 0;
        const overrun = sec > budget * 1.25;
        return `<div class="cat-row">
          <span>${b} t. (${bandCount[b]} kl.)</span>
          <div class="bar"><div style="width:${Math.min(100,pct)}%;background:${overrun?'var(--bad)':'var(--accent)'}"></div></div>
          <span class="pill ${overrun?'bad':'muted'}">${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')} / ${Math.floor(budget/60)}:${String(budget%60).padStart(2,'0')}</span>
        </div>`;
      }).join('')}
    </section>

    ${(confSummary.a.att + confSummary.b.att + confSummary.c.att) > 0 ? `
    <section class="card">
      <h3>Pasitikėjimas vs. teisingumas</h3>
      <p style="margin-top:0;font-size:13px;color:var(--muted)">Jei „Tikrai žinau" tikslumas mažesnis nei 80%, vadinasi per dažnai esi pernelyg užtikrintas. Realiame Kengūros konkurse tai brangiai kainuoja (−25% už klaidą).</p>
      ${[
        {k:'a', label:'Tikrai žinau'},
        {k:'b', label:'Spėju iš dviejų'},
        {k:'c', label:'Atsitiktinai'},
      ].map(({k,label}) => {
        const s = confSummary[k];
        if(!s.att) return '';
        const pct = Math.round(100*s.ok/s.att);
        const danger = k === 'a' && pct < 80;
        return `<div class="cat-row">
          <span>${label}</span>
          <div class="bar"><div style="width:${pct}%;background:${danger?'var(--bad)':'var(--good)'}"></div></div>
          <span class="pill ${danger?'bad':(pct>=80?'good':'muted')}">${s.ok}/${s.att} (${pct}%)</span>
        </div>`;
      }).join('')}
    </section>` : ''}

    <section class="card">
      <h3>Pagal kategorijas</h3>
      ${Object.entries(catBreak).map(([cat,b])=>{
        const pct = Math.round(100*b.ok/b.total);
        return `<div class="cat-row">
          <span>${CATEGORY_LABEL[cat]||cat}</span>
          <div class="bar"><div style="width:${pct}%"></div></div>
          <span class="pill ${pct>=80?"good":pct>=50?"muted":"bad"}">${b.ok}/${b.total}</span>
        </div>`;
      }).join("")}
    </section>

    <section class="card">
      <h3>Klaidos (${wrongs.length})</h3>
      ${wrongs.length === 0 ? `<p class="empty">Šaunuolis – nė vienos klaidos!</p>`:
        wrongs.map(({q,ans,i})=>{
          const renderOpt = (idx)=>{
            if(idx == null) return "<i>nepasirinkta</i>";
            if(q.imageOptions) return `${String.fromCharCode(65+idx)} (paveikslas)`;
            return escapeHTML(q.options[idx]);
          };
          const sub = q.subtopic && SUBTOPIC_LABEL[q.subtopic] ? SUBTOPIC_LABEL[q.subtopic] : "";
          return `
          <details>
            <summary>${i+1}. ${escapeHTML(shortPrompt(q.prompt))}</summary>
            <p><b>Tavo atsakymas:</b> ${ans ? renderOpt(ans.chosen) : "<i>nepasirinkta</i>"}</p>
            <p><b>Teisingas:</b> ${renderOpt(q.correctIndex)}</p>
            <p class="explain">${escapeHTML(q.explain)}</p>
            <div class="footer-actions">
              <div class="row">
                <span class="pill muted">${CATEGORY_LABEL[q.category]||q.category}</span>
                ${sub ? `<span class="subtopic">· ${escapeHTML(sub)}</span>`:``}
              </div>
              <button class="btn small primary" data-similar="${i}">Spręsti panašų</button>
            </div>
          </details>
        `}).join("")
      }
    </section>

    <section class="card">
      <div class="footer-actions">
        <button class="btn ghost" id="homeBtn">← Į pradžią</button>
        <button class="btn primary" id="againBtn">Naujas testas</button>
      </div>
    </section>
  `;

  document.getElementById("homeBtn").addEventListener("click", ()=>{ state.view="home"; renderHome(); });
  document.getElementById("againBtn").addEventListener("click", startQuiz);
  $app.querySelectorAll("[data-similar]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const i = parseInt(b.dataset.similar,10);
      state._returnTo = "results";
      openSimilar(state.questions[i].gen);
    });
  });
}

/* ============================================================
   CONTEST SIMULATOR — true Kangaroo conditions.

   75 min, 30 questions from a real past paper, −25% for wrong,
   no hints, no playlists, no confidence picker, no "practice
   similar" button. The point is to teach the kid contest-day
   conditions: cold paper, time pressure, no help.

   Stored in store.contests separately from store.sessions.
   ============================================================ */
const CONTEST_DURATION_MS = 75 * 60 * 1000;

function openContest(year){
  const test = ARCHIVE.find(t => t.year === year);
  if(!test){ return; }
  const qs = test.questions.filter(q => q.correct).slice(0, 30);
  if(qs.length < 28){
    alert(`${year} m. neturi pakankamai klausimų su atsakymais kontroliniam.`);
    return;
  }
  state.view = "contest";
  state.contestYear = year;
  state.contestQuestions = qs;
  state.contestAnswers = {};   // { qnum: chosenLetter }
  state.contestCurrent = 0;
  state.contestStartedAt = Date.now();
  state.contestEndsAt = Date.now() + CONTEST_DURATION_MS;
  state.contestSubmitted = false;
  if(state._contestTimerInterval) clearInterval(state._contestTimerInterval);
  state._contestTimerInterval = setInterval(()=>{
    if(state.view !== "contest"){ clearInterval(state._contestTimerInterval); return; }
    if(Date.now() >= state.contestEndsAt){
      finishContest(true);
    } else {
      // re-render only timer bar
      const tb = document.getElementById("contestTimer");
      if(tb){
        const remain = Math.max(0, state.contestEndsAt - Date.now());
        const mm = Math.floor(remain/60000);
        const ss = Math.floor((remain%60000)/1000);
        tb.textContent = `${mm}:${String(ss).padStart(2,"0")}`;
      }
    }
  }, 1000);
  renderContest();
}

function renderContest(){
  const qs = state.contestQuestions;
  const idx = state.contestCurrent;
  const q = qs[idx];
  const total = qs.length;
  const answeredCount = Object.keys(state.contestAnswers).length;
  const remain = Math.max(0, state.contestEndsAt - Date.now());
  const mm = Math.floor(remain/60000);
  const ss = Math.floor((remain%60000)/1000);

  const optionsHtml = ["A","B","C","D","E"].map(letter => {
    const v = q.options[letter]; if(v == null) return "";
    const chosen = state.contestAnswers[q.num];
    const cls = "opt" + (chosen === letter ? " selected" : "");
    return `<div class="${cls}" data-letter="${letter}">
      <span class="letter">${letter}</span>
      <span>${escapeHTML(v)}</span>
    </div>`;
  }).join("");
  const figureHtml = q.figure ? `<div class="figure"><img src="${encodeURI(q.figure)}" alt="" style="max-width:100%;border-radius:8px;border:1px solid var(--line)" loading="lazy"></div>` : "";

  // Question strip showing all 30; answered are filled
  const strip = qs.map((qq, i) => {
    const ans = state.contestAnswers[qq.num];
    const cur = i === idx ? " current" : "";
    const filled = ans ? " filled" : "";
    return `<button class="contest-pip${cur}${filled}" data-jump="${i}" title="Klausimas ${qq.num} (${qq.points} t.)">${qq.num}</button>`;
  }).join("");

  $app.innerHTML = `
    <section class="card">
      <div class="contest-header">
        <div>
          <b>Kontrolinis – ${escapeHTML(state.contestYear)} m.</b>
          <span class="help-bar" style="margin-left:6px">${answeredCount} / ${total} atsakyta</span>
        </div>
        <div class="contest-timer-box">
          ⏱ <span id="contestTimer">${mm}:${String(ss).padStart(2,"0")}</span>
        </div>
      </div>
      <div class="contest-strip">${strip}</div>
    </section>

    <section class="card">
      <div class="qmeta">
        <b>Klausimas ${q.num}</b>
        <span class="pill">${q.points} t.</span>
        <span class="pill bad">−${(q.points*0.25).toFixed(2)} už klaidą</span>
      </div>
      <div class="qprompt">${escapeHTML(q.prompt)}</div>
      ${figureHtml}
      <div class="options" id="contestOptions">${optionsHtml}</div>

      <div class="footer-actions">
        <div class="row">
          ${idx > 0 ? `<button class="btn ghost small" id="contestPrev">← Ankstesnis</button>` : ''}
          ${idx < total-1 ? `<button class="btn small" id="contestNext">Kitas →</button>` : ''}
          <button class="btn small ghost" id="contestSkip">Praleisti (atsakyti vėliau)</button>
        </div>
        <div class="row">
          <button class="btn primary" id="contestFinish">Baigti</button>
        </div>
      </div>
    </section>
  `;

  document.getElementById("contestOptions").addEventListener("click", e => {
    const o = e.target.closest(".opt"); if(!o) return;
    state.contestAnswers[q.num] = o.dataset.letter;
    renderContest();
  });
  $app.querySelectorAll("[data-jump]").forEach(btn => {
    btn.addEventListener("click", ()=>{
      state.contestCurrent = parseInt(btn.dataset.jump, 10);
      renderContest();
    });
  });
  const prev = document.getElementById("contestPrev");
  if(prev) prev.addEventListener("click", ()=>{ state.contestCurrent--; renderContest(); });
  const next = document.getElementById("contestNext");
  if(next) next.addEventListener("click", ()=>{ state.contestCurrent++; renderContest(); });
  const skip = document.getElementById("contestSkip");
  if(skip) skip.addEventListener("click", ()=>{
    // advance to next unanswered
    let i = state.contestCurrent + 1;
    for(let j = 0; j < qs.length; j++){
      const k = (i + j) % qs.length;
      if(!state.contestAnswers[qs[k].num]){ state.contestCurrent = k; renderContest(); return; }
    }
    // all answered
    finishContest(false);
  });
  document.getElementById("contestFinish").addEventListener("click", ()=>{
    const unanswered = qs.filter(qq => !state.contestAnswers[qq.num]).length;
    const msg = unanswered
      ? `Liko ${unanswered} neatsakyti klausimai. Tikrai baigti?\n\nNeatsakyti = 0 taškų (be baudos – kaip realiame konkurse).`
      : "Tikrai baigti kontrolinį?";
    if(confirm(msg)) finishContest(false);
  });
}

function finishContest(byTimer){
  if(state._contestTimerInterval){ clearInterval(state._contestTimerInterval); state._contestTimerInterval = null; }
  const qs = state.contestQuestions;
  let points = 0, scoreWithPenalty = 0, correct = 0, answered = 0, maxPoints = 0;
  const byBand = {3:{ok:0,total:0}, 4:{ok:0,total:0}, 5:{ok:0,total:0}};
  qs.forEach(q => {
    const band = q.points || 3;
    maxPoints += band;
    byBand[band].total++;
    const a = state.contestAnswers[q.num];
    if(!a) return;
    answered++;
    if(a === q.correct){
      correct++;
      points += band;
      scoreWithPenalty += band;
      byBand[band].ok++;
    } else {
      scoreWithPenalty -= band * 0.25;
    }
  });
  const result = {
    when: Date.now(),
    year: state.contestYear,
    points, scoreWithPenalty: Math.round(scoreWithPenalty * 4)/4,
    maxPoints, correct, total: qs.length, answered,
    byBand, byTimer: !!byTimer,
    answers: Object.fromEntries(qs.map(q => [q.num, state.contestAnswers[q.num] || null])),
  };
  store.contests = store.contests || [];
  store.contests.push(result);
  if(store.contests.length > 30) store.contests = store.contests.slice(-30);
  saveStore(store);
  state._lastContestResult = result;
  state.view = "contestResults";
  renderContestResults();
}

function renderContestResults(){
  const r = state._lastContestResult;
  const qs = state.contestQuestions;
  const wrongs = qs.filter(q => state.contestAnswers[q.num] && state.contestAnswers[q.num] !== q.correct);
  const skipped = qs.filter(q => !state.contestAnswers[q.num]);
  const pct = Math.round(100*r.correct/r.total);

  $app.innerHTML = `
    <section class="card">
      <button class="nav-back" id="contestBack">← Į pradžią</button>
      <h2>Kontrolinio rezultatai – ${escapeHTML(r.year)} m.</h2>
      ${r.byTimer ? `<p class="help-bar"><b>Laikas pasibaigė</b> – kontrolinis baigėsi automatiškai.</p>` : ''}
      <div class="grid two">
        <div class="stat"><b>${r.correct} / ${r.total}</b><span>Teisingi atsakymai (${pct} %)</span></div>
        <div class="stat"><b>${r.scoreWithPenalty} / ${r.maxPoints}</b><span>Su −25 % bauda</span></div>
        <div class="stat"><b>${r.points} / ${r.maxPoints}</b><span>Be baudos</span></div>
        <div class="stat"><b>${r.answered}</b><span>Atsakyta · ${qs.length - r.answered} praleista</span></div>
      </div>
    </section>

    <section class="card">
      <h3>Pagal sudėtingumą</h3>
      ${[3,4,5].map(b=>{
        const x = r.byBand[b];
        if(!x.total) return '';
        const p = Math.round(100*x.ok/x.total);
        return `<div class="cat-row">
          <span>${b} t. (${x.total} kl.)</span>
          <div class="bar"><div style="width:${p}%;background:${p>=70?'var(--good)':p>=40?'var(--accent)':'var(--bad)'}"></div></div>
          <span class="pill ${p>=70?'good':p>=40?'muted':'bad'}">${x.ok}/${x.total}</span>
        </div>`;
      }).join('')}
    </section>

    ${wrongs.length ? `
    <section class="card">
      <h3>Klaidos (${wrongs.length})</h3>
      ${wrongs.map(q => {
        const chosen = state.contestAnswers[q.num];
        return `<details>
          <summary>${q.num}. (${q.points} t.) ${escapeHTML(q.prompt.slice(0, 100))}${q.prompt.length > 100 ? '…' : ''}</summary>
          <p><b>Tavo atsakymas:</b> ${chosen} (${escapeHTML(q.options[chosen]||'')})</p>
          <p><b>Teisingas:</b> ${q.correct} (${escapeHTML(q.options[q.correct]||'')})</p>
          ${q.misconceptions && q.misconceptions[chosen] ? `<p class="explain"><b>Tavo klaida:</b> ${escapeHTML(q.misconceptions[chosen])}</p>` : ''}
          <p class="explain">${escapeHTML(q.solutionKid || q.solution || '')}</p>
        </details>`;
      }).join('')}
    </section>` : ''}

    ${skipped.length ? `
    <section class="card">
      <h3>Praleisti (${skipped.length})</h3>
      <p class="help-bar">Praleisti = 0 taškų, bet be baudos. Dažnai geriau praleisti nei atsitiktinai spėti.</p>
      ${skipped.map(q => `<details>
        <summary>${q.num}. (${q.points} t.) ${escapeHTML(q.prompt.slice(0, 100))}${q.prompt.length > 100 ? '…' : ''}</summary>
        <p><b>Teisingas:</b> ${q.correct} (${escapeHTML(q.options[q.correct]||'')})</p>
        <p class="explain">${escapeHTML(q.solutionKid || q.solution || '')}</p>
      </details>`).join('')}
    </section>` : ''}

    ${store.contests.length >= 2 ? `
    <section class="card">
      <h3>Tavo kontrolinių istorija</h3>
      ${store.contests.slice(-10).reverse().map(c => `
        <div class="cat-row">
          <span>${new Date(c.when).toLocaleDateString("lt-LT")} (${escapeHTML(c.year)} m.)</span>
          <span class="pill ${c.scoreWithPenalty/c.maxPoints>=0.7?'good':c.scoreWithPenalty/c.maxPoints>=0.4?'muted':'bad'}">${c.scoreWithPenalty} / ${c.maxPoints}</span>
        </div>
      `).join('')}
    </section>` : ''}
  `;
  document.getElementById("contestBack").addEventListener("click", ()=>{
    state.view = "home"; renderHome();
  });
}

function openParent(){
  state.view = "parent";
  renderParent();
}

function renderParent(){
  const totalMechs = Object.keys(MECHANIC_METHODOLOGY).length;
  const masteredCount = Object.keys(store.masteredMech || {}).length;
  // 14-day streak grid
  const days = [];
  const now = new Date();
  for(let i = 13; i >= 0; i--){
    const d = new Date(now.getTime() - i * 24*60*60*1000);
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    const k = `${d.getFullYear()}-${m}-${da}`;
    const a = store.activity[k];
    let lvl = 0;
    if(a){
      if(a.answered >= 20) lvl = 3;
      else if(a.answered >= 10) lvl = 2;
      else if(a.answered >= 1) lvl = 1;
    }
    days.push({date: k, label: `${da}.${m}`, lvl, count: a?a.answered:0, ok: a?a.correct:0});
  }

  // This week's activity
  let weekAnswered = 0, weekCorrect = 0;
  days.slice(7).forEach(d => { weekAnswered += d.count; weekCorrect += d.ok; });

  // Worst 3 mechanics
  const worst = weakestMechanics(3);

  // Last session
  const last = store.sessions[store.sessions.length-1];
  let lastBreak = '';
  if(last && last.questions){
    const breakdown = {};
    last.questions.forEach(q => {
      if(q.correct) return;
      const c = q.category || 'kita';
      breakdown[c] = (breakdown[c] || 0) + 1;
    });
    const items = Object.entries(breakdown).sort((a,b)=>b[1]-a[1]);
    if(items.length){
      lastBreak = `<ul style="margin:6px 0 0">${items.map(([c,n]) => `<li>${escapeHTML(CATEGORY_LABEL[c]||c)} – ${n} klaida</li>`).join('')}</ul>`;
    }
  }

  $app.innerHTML = `
    <section class="card">
      <button class="nav-back" id="parentBack">← Į vaiko rodinį</button>
      <h2>Tėvų rodinys</h2>
      <p class="help-bar">Trumpas vaizdas, kaip vaikui sekasi. Pasidalink šio puslapio nuoroda – tas pats vaiko progresas matomas.</p>

      <div class="grid two" style="margin-top:14px">
        <div class="stat"><b>${masteredCount} / ${totalMechs}</b><span>Įvaldytos mechanikos</span></div>
        <div class="stat"><b>${weekAnswered}</b><span>Šios savaitės atsakymai (${weekCorrect} teisingų)</span></div>
      </div>
    </section>

    <section class="card">
      <h3>14 dienų aktyvumas</h3>
      <div class="activity-grid">
        ${days.map(d => `<div class="activity-cell lvl${d.lvl}" title="${d.label}: ${d.count} atsakymų"></div>`).join('')}
      </div>
      <p class="help-bar">Kuo tamsesnė ląstelė, tuo daugiau dirbta tą dieną. Tikslas – ne kiek, o kasdien.</p>
    </section>

    ${worst.length ? `
    <section class="card">
      <h3>Silpnesnės mechanikos – siūlome plejlistus</h3>
      ${worst.map(w => {
        const pct = Math.round(100*w.rate);
        return `<div class="cat-row">
          <span>${escapeHTML(MECHANIC_LABEL[w.mech]||w.mech)}</span>
          <div class="bar"><div style="width:${pct}%;background:var(--bad)"></div></div>
          <span class="pill bad">${pct}% klaidų</span>
          <button class="btn small primary" data-mech-playlist="${w.mech}" style="margin-left:8px">Atverti playlistą</button>
        </div>`;
      }).join('')}
    </section>` : `
    <section class="card">
      <h3>Silpnesnės mechanikos</h3>
      <p class="empty">Statistikos kol kas neužtenka. Vaikui reikia atsakyti į bent 2 to paties tipo užduotis, kad pamatytume tendenciją.</p>
    </section>`}

    ${last ? `
    <section class="card">
      <h3>Paskutinis testas (${new Date(last.when).toLocaleString("lt-LT")})</h3>
      <p><b>${last.correct} / ${last.total}</b> teisingai · ${last.points} taškai${last.pointsWithPenalty != null ? ` (su −25% bauda: ${last.pointsWithPenalty})` : ''}</p>
      ${lastBreak ? `<p><b>Klaidų pasiskirstymas:</b></p>${lastBreak}` : ''}
    </section>` : ''}

    ${(store.confStats.a.attempts + store.confStats.b.attempts + store.confStats.c.attempts) > 0 ? `
    <section class="card">
      <h3>Pasitikėjimo kalibracija</h3>
      <p style="margin-top:0;font-size:13px;color:var(--muted)">Jei „Tikrai žinau" tikslumas žemas, vaikas dažnai būna pernelyg užtikrintas – tai brangu kontrolinyje su −25% bauda.</p>
      ${[
        {k:'a', label:'Tikrai žinau'},
        {k:'b', label:'Spėju iš dviejų'},
        {k:'c', label:'Atsitiktinai'},
      ].map(({k,label}) => {
        const s = store.confStats[k];
        if(!s.attempts) return '';
        const ok = s.attempts - s.wrong;
        const pct = Math.round(100*ok/s.attempts);
        const danger = k === 'a' && pct < 80 && s.attempts >= 5;
        return `<div class="cat-row">
          <span>${label}</span>
          <div class="bar"><div style="width:${pct}%;background:${danger?'var(--bad)':'var(--good)'}"></div></div>
          <span class="pill ${danger?'bad':(pct>=80?'good':'muted')}">${ok}/${s.attempts} (${pct}%)</span>
        </div>`;
      }).join('')}
    </section>` : ''}
  `;
  document.getElementById("parentBack").addEventListener("click", ()=>{ state.view="home"; renderHome(); });
  $app.querySelectorAll("[data-mech-playlist]").forEach(btn=>{
    btn.addEventListener("click", ()=>{ openPlaylist(btn.dataset.mechPlaylist); });
  });
}

function openSimilar(genKey){
  const seed = Math.floor(Math.random()*9999999);
  state.reviewSimilar = buildQuestionFromKey(genKey, seed);
  state.view = "review";
  state._chosen = null; state._hintShown = false;
  renderReview();
}

/* ----------------------------------------------------------------
   PLAYLIST MODE — 4-step mastery sequence per mechanic.

   Step 0: Read the trick (methodology blurb)
   Step 1: Worked example — one archive Q with solution shown
   Step 2: Try with hints — one archive Q at the source band
   Step 3: Mastery check — 3 archive Qs, 5-min timer, no hints

   On step 3 success (≥2/3 correct in time), the mechanic is marked
   "mastered" in store.masteredMech.
   ---------------------------------------------------------------- */
function archiveQsForMech(mech, band){
  const out = [];
  for(const t of ARCHIVE){
    for(const q of t.questions){
      if(q.mechanic !== mech) continue;
      if(band && (q.points || 3) !== band) continue;
      if(!q.correct) continue;  // need answer key for the mastery check
      out.push({year:t.year, q});
    }
  }
  return out;
}

function pickPlaylistContent(mech){
  // Pool of archive questions of this mechanic, grouped by band
  const byBand = {3:[], 4:[], 5:[]};
  for(const item of archiveQsForMech(mech, null)){
    byBand[item.q.points || 3].push(item);
  }
  // Worked example: prefer one band BELOW source band so the kid sees
  // the trick on something easier first.
  // Mastery: 3 questions of the source band.
  const has5 = byBand[5].length > 0;
  const has4 = byBand[4].length > 0;
  const has3 = byBand[3].length > 0;
  let sourceBand = has5 ? 5 : (has4 ? 4 : 3);
  let workedFromBand = has4 && sourceBand === 5 ? 4 : (has3 && sourceBand >= 4 ? 3 : sourceBand);
  // Helper to pop a random item from a list
  function popRand(arr){ if(!arr.length) return null; const i = Math.floor(Math.random()*arr.length); return arr.splice(i,1)[0]; }
  const used = new Set();
  function take(band){
    const pool = byBand[band].filter(x => !used.has(`${x.year}-${x.q.num}`));
    if(!pool.length) return null;
    const item = pool[Math.floor(Math.random()*pool.length)];
    used.add(`${item.year}-${item.q.num}`);
    return item;
  }
  const worked = take(workedFromBand) || take(sourceBand);
  const tryQ   = take(sourceBand) || take(workedFromBand);
  const mastery = [];
  for(let i=0; i<3; i++){
    const m = take(sourceBand) || take(workedFromBand) || take(3);
    if(m) mastery.push(m);
  }
  return {sourceBand, worked, tryQ, mastery};
}

function openPlaylist(mech){
  state.view = "playlist";
  state.playlistMech = mech;
  state.playlistStep = 0;
  state.playlistContent = pickPlaylistContent(mech);
  state.playlistAns = {};       // key: "year-num" -> chosen letter
  state.playlistSubmitted = {}; // key -> bool
  state.playlistHintShown = {}; // key -> bool
  state.playlistTimerStart = 0;
  renderPlaylist();
}

function openDueQueue(){
  // Due-queue is rendered as a mini playlist of the user's due questions.
  const due = dueNow();
  if(!due.length){ return; }
  // Map each due item to {year, q}
  const items = [];
  for(const d of due.slice(0, 10)){
    const t = ARCHIVE.find(x=>x.year===d.year);
    if(!t) continue;
    const q = t.questions.find(x=>x.num===d.num);
    if(!q || !q.correct) continue;
    items.push({year:d.year, q});
  }
  if(!items.length) return;
  state.view = "playlist";
  state.playlistMech = "__due__";
  state.playlistStep = 3;       // jump straight to mastery step (just answers)
  state.playlistContent = {sourceBand:0, worked:null, tryQ:null, mastery:items};
  state.playlistAns = {};
  state.playlistSubmitted = {};
  state.playlistHintShown = {};
  renderPlaylist();
}

function renderPlaylist(){
  const mech = state.playlistMech;
  const isDue = mech === "__due__";
  const meta = isDue ? null : (MECHANIC_METHODOLOGY[mech] || {});
  const content = state.playlistContent;
  const step = state.playlistStep;

  const titleHtml = isDue
    ? `<h2 style="margin:0 0 4px">Pasikartoti laukia</h2>
       <p class="help-bar" style="margin:0">Šios užduotys sugrįžo iš tavo kartojimo eilės. Atsakyk teisingai – jos pereis į kitą intervalą (1d → 3d → 7d → 14d → 30d → įvaldyta).</p>`
    : `<h2 style="margin:0 0 4px">${escapeHTML(meta.title || mech)}</h2>
       <p class="help-bar" style="margin:0">${escapeHTML(meta.summary || '')}</p>`;

  const stepsHtml = isDue ? "" : `
    <div class="playlist-steps">
      ${[0,1,2,3].map(i => {
        const pip = i < step ? "done" : (i === step ? "now" : "");
        return `<span class="step-pip ${pip}">${i+1}</span>`;
      }).join('<span>·</span>')}
      <span style="margin-left:6px">Žingsnis ${step+1}/4</span>
    </div>
  `;

  let body = "";
  if(!isDue && step === 0){
    body = `
      <div class="methodology">
        <h4>Triukas</h4>
        <p>${escapeHTML(meta.trick || '')}</p>
        <h4>Pirmas žingsnis sprendžiant</h4>
        <p>${escapeHTML(meta.keyStep || '')}</p>
        ${meta.pitfalls ? `<h4>Klaidos, kurių vengti</h4><p>${escapeHTML(meta.pitfalls)}</p>` : ''}
      </div>
      <div class="footer-actions">
        <button class="btn ghost" id="plBack">← Į pradžią</button>
        <button class="btn primary" id="plNext">Toliau – pažiūrėk pavyzdį</button>
      </div>
    `;
  } else if(!isDue && step === 1 && content.worked){
    body = renderPlaylistQuestion(content.worked, {showSolution:true, mode:"worked"});
  } else if(!isDue && step === 2 && content.tryQ){
    body = renderPlaylistQuestion(content.tryQ, {showSolution:false, mode:"try"});
  } else if(step === 3){
    if(!state.playlistTimerStart) state.playlistTimerStart = Date.now();
    const items = content.mastery || [];
    const submittedCount = items.filter(it => state.playlistSubmitted[`${it.year}-${it.q.num}`]).length;
    const correctCount = items.filter(it => {
      const k = `${it.year}-${it.q.num}`;
      return state.playlistSubmitted[k] && state.playlistAns[k] === it.q.correct;
    }).length;
    const allDone = submittedCount === items.length;
    body = `
      <p><b>${isDue ? 'Pakartojimo eilė' : 'Įvaldymo testas'}:</b> ${items.length} užduotys, ${isDue?'be laiko':'5 min, be užuominų'}.${allDone ? '' : ' Atsakyk į visas, paskui paspausk „Baigti".'}</p>
      ${items.map(it => renderPlaylistQuestion(it, {showSolution: state.playlistSubmitted[`${it.year}-${it.q.num}`], mode:"mastery"})).join('')}
      ${allDone ? `
        <div class="explain" style="background:${correctCount >= 2 ? 'var(--good-soft)' : 'var(--bad-soft)'};border:1px solid ${correctCount >= 2 ? 'var(--good)' : 'var(--bad)'};">
          <b>${correctCount >= 2 ? 'Šaunu!' : 'Reikia padirbėti.'}</b>
          Iš ${items.length} užduočių teisingai atsakyta ${correctCount}.
          ${correctCount >= 2 && !isDue ? 'Mechanika pažymėta kaip įvaldyta.' : (isDue ? '' : 'Pabandyk dar kartą po kelių dienų.')}
        </div>
      ` : ``}
      <div class="footer-actions">
        <button class="btn ghost" id="plBack">← Į pradžią</button>
        ${allDone ? `<button class="btn primary" id="plDone">Baigti</button>` : ''}
      </div>
    `;
  } else {
    body = `<p class="empty">Šios mechanikos archive duomenų neužtenka. Grįžk ir pasirink kitą.</p>
      <div class="footer-actions"><button class="btn ghost" id="plBack">← Į pradžią</button></div>`;
  }

  $app.innerHTML = `
    <section class="card">
      <button class="nav-back" id="plBackTop">← Į pradžią</button>
      ${titleHtml}
      ${stepsHtml}
      ${body}
    </section>
  `;

  // Wire common controls
  const backTop = document.getElementById("plBackTop");
  if(backTop) backTop.addEventListener("click", ()=>{ state.view="home"; renderHome(); });
  const back = document.getElementById("plBack");
  if(back) back.addEventListener("click", ()=>{ state.view="home"; renderHome(); });
  const next = document.getElementById("plNext");
  if(next) next.addEventListener("click", ()=>{ state.playlistStep++; renderPlaylist(); });
  const done = document.getElementById("plDone");
  if(done) done.addEventListener("click", ()=>{
    // Compute mastery and persist
    if(!isDue){
      const items = content.mastery || [];
      const correctCount = items.filter(it => {
        const k = `${it.year}-${it.q.num}`;
        return state.playlistAns[k] === it.q.correct;
      }).length;
      if(correctCount >= 2) {
        store.masteredMech[state.playlistMech] = Date.now();
      }
    }
    // Record each mastery answer into mech stats + spaced rep
    (content.mastery || []).forEach(it => {
      const k = `${it.year}-${it.q.num}`;
      if(!state.playlistSubmitted[k]) return;
      recordArchiveAnswer(it.year, it.q, state.playlistAns[k] === it.q.correct);
    });
    saveStore(store);
    state.view = "home";
    renderHome();
  });

  // Wire each playlist question's option clicks + check buttons
  $app.querySelectorAll(".playlist-q").forEach(card => {
    const yr = card.dataset.year;
    const num = parseInt(card.dataset.qnum, 10);
    const k = `${yr}-${num}`;
    card.querySelectorAll(".opt[data-letter]").forEach(opt => {
      opt.addEventListener("click", ()=>{
        if(state.playlistSubmitted[k]) return;
        state.playlistAns[k] = opt.dataset.letter;
        renderPlaylist();
      });
    });
    const checkBtn = card.querySelector("[data-pl-check]");
    if(checkBtn) checkBtn.addEventListener("click", ()=>{
      if(state.playlistAns[k] == null) return;
      state.playlistSubmitted[k] = true;
      // For try/worked steps (not mastery), record one answer right away
      if(state.playlistStep !== 3){
        const it = state.playlistStep === 1 ? content.worked : content.tryQ;
        if(it){
          recordArchiveAnswer(it.year, it.q, state.playlistAns[k] === it.q.correct);
        }
      }
      renderPlaylist();
    });
    const hintBtn = card.querySelector("[data-pl-hint]");
    if(hintBtn) hintBtn.addEventListener("click", ()=>{
      state.playlistHintShown[k] = true;
      renderPlaylist();
    });
    const nextStepBtn = card.querySelector("[data-pl-nextstep]");
    if(nextStepBtn) nextStepBtn.addEventListener("click", ()=>{
      state.playlistStep++;
      renderPlaylist();
    });
  });
}

function renderPlaylistQuestion(item, opts){
  const {year, q} = item;
  const k = `${year}-${q.num}`;
  const chosen = state.playlistAns[k];
  const submitted = !!state.playlistSubmitted[k];
  const showSol = opts.showSolution || submitted;
  const mode = opts.mode;
  const optionsHtml = ["A","B","C","D","E"].map(letter => {
    const v = q.options[letter];
    if(v == null) return "";
    let extra = "";
    if(submitted){
      if(q.correct === letter) extra = " correct";
      else if(chosen === letter) extra = " wrong";
    } else if(chosen === letter){
      extra = " selected";
    }
    return `<div class="opt${extra}" data-letter="${letter}">
      <span class="letter">${letter}</span>
      <span>${escapeHTML(v)}</span>
    </div>`;
  }).join("");
  const figureHtml = q.figure
    ? `<div class="figure"><img src="${encodeURI(q.figure)}" alt="" style="max-width:100%;border-radius:8px;border:1px solid var(--line)"></div>`
    : "";
  const showHint = mode === "try" && !submitted && state.playlistHintShown[k];
  const approach = q.solution ? approachFromSolution(q.solution) : null;
  let footer = "";
  if(mode === "worked"){
    footer = submitted
      ? `<button class="btn small primary" data-pl-nextstep>Toliau – pabandyk pats</button>`
      : `<button class="btn small primary" data-pl-check ${chosen ? '' : 'disabled'}>Patikrinti</button>`;
  } else if(mode === "try"){
    footer = submitted
      ? `<button class="btn small primary" data-pl-nextstep>Toliau – įvaldymo testas</button>`
      : `${approach && !state.playlistHintShown[k] ? `<button class="btn small ghost" data-pl-hint>Užuomina</button>` : ''}
         <button class="btn small primary" data-pl-check ${chosen ? '' : 'disabled'}>Patikrinti</button>`;
  } else { // mastery
    footer = submitted
      ? ''
      : `<button class="btn small primary" data-pl-check ${chosen ? '' : 'disabled'}>Atsakyti</button>`;
  }
  return `
    <section class="card playlist-q" data-year="${year}" data-qnum="${q.num}" style="margin-top:12px">
      <div class="qmeta">
        <b>${escapeHTML(year)} · K${q.num}</b>
        <span class="pill">${q.points} t.</span>
        ${q.mechanic ? `<span class="pill muted">${escapeHTML(MECHANIC_LABEL[q.mechanic]||q.mechanic)}</span>` : ''}
      </div>
      <div class="qprompt">${escapeHTML(q.prompt)}</div>
      ${figureHtml}
      <div class="options">${optionsHtml}</div>
      ${showHint && approach ? `<div class="hint"><b>Užuomina:</b> ${escapeHTML(approach)}</div>` : ''}
      ${showSol && q.solution ? `<div class="explain"><b>Sprendimas:</b> ${escapeHTML(q.solution)}</div>` : ''}
      ${submitted ? `<div class="explain" style="background:${chosen === q.correct ? 'var(--good-soft)' : 'var(--bad-soft)'};border:1px solid ${chosen === q.correct ? 'var(--good)' : 'var(--bad)'};">
        <b>${chosen === q.correct ? 'Teisingai!' : 'Klaida.'}</b>
        Teisingas atsakymas – <b>${q.correct}</b>${q.options[q.correct]?` (${escapeHTML(q.options[q.correct])})`:''}.
      </div>` : ''}
      <div class="footer-actions">
        <div class="row"></div>
        <div class="row">${footer}</div>
      </div>
    </section>
  `;
}

function renderReview(){
  const q = state.reviewSimilar;
  const showResult = state._submittedReview;
  const backLabel = state._returnTo === "archiveYear"
    ? "← Atgal į originalų testą"
    : (state._returnTo === "home" ? "← Į pradžią" : "← Atgal į rezultatus");
  const subtopicLabel = q.subtopic && SUBTOPIC_LABEL[q.subtopic] ? SUBTOPIC_LABEL[q.subtopic] : "";
  $app.innerHTML = `
    <section class="card">
      <button class="nav-back" id="backBtn">${backLabel}</button>
      <div class="qmeta">
        <span><b>Panašus uždavinys</b></span>
        <span class="pill">${q.difficulty} t.</span>
        <span class="pill muted">${CATEGORY_LABEL[q.category]||q.category}</span>
        ${subtopicLabel ? `<span class="subtopic">· ${escapeHTML(subtopicLabel)}</span>`:``}
      </div>
      <div class="qprompt">${escapeHTML(q.prompt)}</div>
      ${q.figure ? `<div class="figure">${q.figure}</div>` : ``}

      <div class="options ${q.imageOptions?'image-options':''}" id="rOptions">
        ${q.options.map((opt,i)=>{
          let cls = "opt";
          if(q.imageOptions) cls += " image-opt";
          if(showResult){
            if(i === q.correctIndex) cls += " correct";
            else if(i === state._reviewChosen) cls += " wrong";
          } else if(state._reviewChosen === i){
            cls += " selected";
          }
          const body = q.imageOptions
            ? `<div class="opt-figure">${opt}</div>`
            : `<span>${escapeHTML(opt)}</span>`;
          return `<div class="${cls}" data-i="${i}">
            <span class="letter">${String.fromCharCode(65+i)}</span>
            ${body}
          </div>`;
        }).join("")}
      </div>

      ${state._reviewFirstStep && !showResult && q.firstStep ? `<div class="firststep"><b>Pirmas žingsnis:</b> ${escapeHTML(q.firstStep)}</div>`:``}
      ${state._reviewHint && !showResult ? `<div class="hint"><b>Užuomina:</b> ${escapeHTML(q.hint)}</div>`:``}
      ${showResult ? `<div class="explain"><b>Paaiškinimas:</b> ${escapeHTML(q.explain)}</div>`:``}

      <div class="footer-actions">
        <div class="row">
          ${!showResult && !state._reviewFirstStep && q.firstStep ? `<button class="btn ghost small" id="rFirstStep">Pirmas žingsnis</button>`:``}
          ${!showResult && !state._reviewHint ? `<button class="btn ghost small" id="rHint">Užuomina</button>`:``}
        </div>
        <div class="row">
          ${!showResult ? `<button class="btn primary" id="rSubmit" ${state._reviewChosen==null?"disabled":""}>Patikrinti</button>`:``}
          ${showResult ? `<button class="btn" id="rAnother">Dar vienas panašus</button>`:``}
        </div>
      </div>
    </section>
  `;

  document.getElementById("backBtn").addEventListener("click", ()=>{
    state._reviewChosen=null; state._reviewHint=false; state._reviewFirstStep=false; state._submittedReview=false;
    if(state._returnTo === "archiveYear"){
      state._returnTo = null;
      state.view = "archiveYear";
      renderArchiveYear();
    } else if(state._returnTo === "home"){
      state._returnTo = null;
      state.view = "home";
      renderHome();
    } else {
      state.view="results"; renderResults();
    }
  });
  const fs = document.getElementById("rFirstStep");
  if(fs) fs.addEventListener("click", ()=>{ state._reviewFirstStep=true; renderReview(); });
  document.getElementById("rOptions").addEventListener("click", e=>{
    if(showResult) return;
    const o = e.target.closest(".opt"); if(!o) return;
    state._reviewChosen = parseInt(o.dataset.i,10);
    renderReview();
  });
  const h = document.getElementById("rHint");
  if(h) h.addEventListener("click", ()=>{ state._reviewHint=true; renderReview(); });
  const s = document.getElementById("rSubmit");
  if(s) s.addEventListener("click", ()=>{
    state._submittedReview = true;
    // also count toward catStats
    const c = store.catStats[q.category] = store.catStats[q.category] || {attempts:0, wrong:0};
    c.attempts++;
    if(state._reviewChosen !== q.correctIndex) c.wrong++;
    saveStore(store);
    renderReview();
  });
  const a = document.getElementById("rAnother");
  if(a) a.addEventListener("click", ()=>{
    state._reviewChosen=null; state._reviewHint=false; state._reviewFirstStep=false; state._submittedReview=false;
    openSimilar(q.gen);
  });
}

/* ============================================================
   VIII. UTIL
   ============================================================ */
function escapeHTML(s){
  if(s==null) return "";
  if(typeof s !== "string") s = String(s);
  // Allow our pre-built SVG strings to pass through (they don't go via escapeHTML)
  return s.replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  })[ch]);
}
function shortPrompt(p){
  if(p.length < 80) return p;
  return p.slice(0,80) + "…";
}

/* ============================================================
   IX. PRADŽIA
   ============================================================ */
renderHome();

// keyboard: 1-5 → answer, Enter → submit/next
document.addEventListener("keydown", e=>{
  if(state.view === "quiz"){
    const q = state.questions[state.current];
    if(!q) return;
    if(e.key >= "1" && e.key <= "5"){
      const i = parseInt(e.key,10)-1;
      if(i < q.options.length && !state.answers[state.current]){
        state._chosen = i;
        renderQuiz();
      }
    } else if(e.key === "Enter"){
      if(state.answers[state.current]){
        if(state.current < state.questions.length-1){
          state.current++;
          state._chosen=null; state._hintShown=false; state._firstStepShown=false;
          renderQuiz();
        } else {
          finishQuiz(false);
        }
      } else if(state._chosen!=null){
        submitAnswer();
      }
    }
  }
});
</script>
