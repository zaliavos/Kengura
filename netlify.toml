[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/help"
  to = "/.netlify/functions/help"
  status = 200

[[redirects]]
  from = "/"
  to = "/kengura.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
